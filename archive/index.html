<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Fomo Workers — Site Upload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: "Plus Jakarta Sans", -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #f2eee8;
      overflow-x: hidden;
    }
    * { -webkit-tap-highlight-color: transparent; }
    /* Hide scrollbar inside the phone */
    .phone-content::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="archive/app.jsx"></script>
  <script type="text/babel" src="tweaks.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "themeKey": "fomo"
    }/*EDITMODE-END*/;

    function Shell() {
      const [themeKey, setThemeKey] = React.useState(TWEAK_DEFAULTS.themeKey);

      const theme = THEMES[themeKey] || THEMES.terracotta;

      return (
        <div style={{
          minHeight: '100vh',
          background: '#ebe5dc',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          padding: '30px 20px', boxSizing: 'border-box',
          position: 'relative',
        }}>
          <IOSDevice width={402} height={874} dark={true}>
            <div className="phone-content" style={{ height: '100%', position: 'relative', overflow: 'hidden' }}>
              <FomoUploadApp themeKey={themeKey} />
            </div>
          </IOSDevice>

          <TweaksPanel themeKey={themeKey} onChange={setThemeKey} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Shell />);
  </script>
</body>
</html>
